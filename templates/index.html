<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador de Badminton</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0047AB 0%, #00CED1 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 30px;
        }

        .logo {
            position: absolute;
            right: 0;
            top: 0;
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 10px;
        }

        .upload-section {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .drop-zone {
            border: 3px dashed #0047AB;
            border-radius: 10px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }

        .drop-zone:hover, .drop-zone.dragover {
            background: #e8f4f8;
            border-color: #00CED1;
        }

        .drop-zone-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .drop-zone-text {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 10px;
        }

        .file-info {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 8px;
            color: #2e7d32;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            margin-top: 20px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0047AB 0%, #00CED1 100%);
            color: white;
            display: none;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 71, 171, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0047AB;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            display: none;
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #0047AB 0%, #00CED1 100%);
            color: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .chart-container {
            text-align: center;
        }

        .chart-container img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .shot-types-list {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 10px;
        }

        .shot-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
        }

        .shot-item:last-child {
            border-bottom: none;
        }

        .error {
            color: #d32f2f;
            padding: 15px;
            background: #ffebee;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏸 Analizador de Badminton</h1>
        <div class="header">
            <img src="/static/logo.jpeg" alt="Logo Badminton" class="logo">
        </div>

        <div class="upload-section">
            <div class="drop-zone" id="dropZone">
                <div class="drop-zone-icon">📹</div>
                <div class="drop-zone-text">Arrastra tu video aquí o haz clic para seleccionar</div>
                <div style="color: #999; font-size: 0.9em;">Formatos: MP4, AVI, MOV</div>
            </div>
            <input type="file" id="fileInput" accept="video/*" style="display: none;">
            
            <div class="file-info" id="fileInfo"></div>
            <div style="text-align: center;">
                <button class="btn btn-primary" id="analyzeBtn">Empezar Análisis</button>
            </div>
            <div class="error" id="errorMsg"></div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="color: white; font-size: 1.2em;">Analizando video... Esto puede tomar unos minutos</p>
        </div>

        <div class="results" id="results">
            <h2 style="margin-bottom: 30px; color: #333;">📊 Resultados del Análisis</h2>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalShots">0</div>
                    <div class="stat-label">Total de Golpes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="attackPercent">0%</div>
                    <div class="stat-label">Ataque</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="defensePercent">0%</div>
                    <div class="stat-label">Defensa</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="errors">0</div>
                    <div class="stat-label">Errores No Forzados</div>
                </div>
                <div class="stat-card" id="scoreCard" style="display:none;">
                    <div class="stat-value" id="score">-</div>
                    <div class="stat-label">Marcador Detectado</div>
                </div>
            </div>

            <div id="observationsBox" style="display:none; margin-bottom:20px; padding:20px; background:#f0f8ff; border-radius:10px; border-left:4px solid #0047AB;">
                <h3 style="margin-bottom:10px; color:#0047AB;">🧠 Análisis Táctico (Claude AI)</h3>
                <p id="observations" style="color:#333; line-height:1.6;"></p>
            </div>

            <div class="shot-types-list" id="shotTypesList"></div>

            <div class="charts">
                <div class="chart-container">
                    <img id="shotTypesChart" src="" alt="Tipos de Golpes">
                </div>
                <div class="chart-container">
                    <img id="attackDefenseChart" src="" alt="Ataque vs Defensa">
                </div>
            </div>
        </div>
    </div>

    <script>
        let uploadedFilename = null;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const errorMsg = document.getElementById('errorMsg');

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('video/')) {
                showError('Por favor selecciona un archivo de video válido');
                return;
            }

            const formData = new FormData();
            formData.append('video', file);

            fileInfo.style.display = 'block';
            fileInfo.textContent = `✓ Video seleccionado: ${file.name}`;
            analyzeBtn.style.display = 'inline-block';
            errorMsg.style.display = 'none';

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    uploadedFilename = data.filename;
                } else {
                    showError(data.error);
                }
            })
            .catch(error => {
                showError('Error al subir el video: ' + error);
            });
        }

        analyzeBtn.addEventListener('click', () => {
            if (!uploadedFilename) {
                showError('Por favor sube un video primero');
                return;
            }

            analyzeBtn.disabled = true;
            loading.style.display = 'block';
            results.style.display = 'none';
            errorMsg.style.display = 'none';

            fetch(`/analyze/${uploadedFilename}`, {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    const analysisId = data.analysis_id;
                    checkProgress(analysisId);
                } else {
                    loading.style.display = 'none';
                    analyzeBtn.disabled = false;
                    showError(data.error);
                }
            })
            .catch(error => {
                loading.style.display = 'none';
                analyzeBtn.disabled = false;
                showError('Error al iniciar análisis: ' + error);
            });
        });

        function checkProgress(analysisId) {
            const interval = setInterval(() => {
                fetch(`/status/${analysisId}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'completed') {
                            clearInterval(interval);
                            loading.style.display = 'none';
                            analyzeBtn.disabled = false;
                            displayResults(data.result);
                        } else if (data.status === 'error') {
                            clearInterval(interval);
                            loading.style.display = 'none';
                            analyzeBtn.disabled = false;
                            showError(data.error || 'Error desconocido');
                        } else {
                            // Actualizar mensaje de progreso
                            const progressText = document.querySelector('#loading p');
                            progressText.textContent = `Analizando video... ${data.progress}%`;
                        }
                    })
                    .catch(error => {
                        clearInterval(interval);
                        loading.style.display = 'none';
                        analyzeBtn.disabled = false;
                        showError('Error al verificar progreso: ' + error);
                    });
            }, 1000); // Verificar cada segundo
        }

        function displayResults(data) {
            const stats = data.stats;
            
            document.getElementById('totalShots').textContent = stats.total_shots;
            document.getElementById('attackPercent').textContent = stats.attack_percentage + '%';
            document.getElementById('defensePercent').textContent = stats.defense_percentage + '%';
            document.getElementById('errors').textContent = stats.unforced_errors;

            // Mostrar marcador si fue detectado
            if (stats.score_detected) {
                document.getElementById('score').textContent = stats.score_detected;
                document.getElementById('scoreCard').style.display = 'block';
            }

            // Mostrar observaciones tácticas
            if (stats.observations) {
                document.getElementById('observations').textContent = stats.observations;
                document.getElementById('observationsBox').style.display = 'block';
            }

            const shotTypesList = document.getElementById('shotTypesList');
            shotTypesList.innerHTML = '<h3 style="margin-bottom: 15px;">Tipos de Golpes</h3>';
            
            for (const [type, count] of Object.entries(stats.shot_types)) {
                const percentage = ((count / stats.total_shots) * 100).toFixed(1);
                shotTypesList.innerHTML += `
                    <div class="shot-item">
                        <span style="font-weight: bold; text-transform: capitalize;">${type}</span>
                        <span>${count} (${percentage}%)</span>
                    </div>
                `;
            }

            document.getElementById('shotTypesChart').src = data.images.shot_types + '?t=' + Date.now();
            document.getElementById('attackDefenseChart').src = data.images.attack_defense + '?t=' + Date.now();

            results.style.display = 'block';
        }

        function showError(message) {
            errorMsg.textContent = '❌ ' + message;
            errorMsg.style.display = 'block';
        }
    </script>
</body>
</html>
